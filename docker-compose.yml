services:
  # --- Database ---
  db:
    image: mariadb:12
    container_name: watchwithme-db
    restart: always
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: root   
    ports:
      - "3307:3306"  
    volumes:
      - db-data:/var/lib/mysql

  # --- Back ----
  backend:
    build: ./backend
    container_name: watchwithme-backend
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mariadb://db:3306/${MARIADB_DATABASE}
      - SPRING_DATASOURCE_USERNAME=${MARIADB_USER}  
      - SPRING_DATASOURCE_PASSWORD=${MARIADB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    depends_on:
      - db
      - ollama

  # --- frontend ---
  frontend:
    build: ./frontend
    container_name: watchwithme-frontend
    restart: always
    ports:
      - "5173:80"
    stdin_open: true
    depends_on:
      - backend

  # --- Ollama model ---
  ollama: 
    image: ollama/ollama 
    container_name: watchwithme-ollama 
    restart: always 
    ports: 
      - "11435:11434" 
    volumes: 
      - ollama-data:/root/.ollama

volumes:
  db-data:
  ollama-data:
