spring.application.name=Calendar



spring.datasource.url=jdbc:mariadb://watchwithme-db:3306/${MARIADB_DATABASE}
spring.datasource.username=${MARIADB_USER}
spring.datasource.password=${MARIADB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect


jwt.secret=${JWT.SECRET}
jwt.lifetime=${JWT.LIFETIME}


spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false


spring.ai.ollama.base-url=http://ollama/ollama:11434
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL}



